name: proyectofinal
description: Aplicación de guardería canina - Proyecto Escolar
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.2.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.4.0
  firebase_storage: ^12.1.3

  # Estado y Navegación
  provider: ^6.1.2
  go_router: ^14.2.0

  # Utilidades
  intl: ^0.19.0
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2
  flutter_svg: ^2.0.10
  google_fonts: ^6.2.1
  flutter_rating_bar: ^4.0.1
  shimmer: ^3.0.0
  url_launcher: ^6.3.0
  uuid: ^4.4.0

  # UI
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
